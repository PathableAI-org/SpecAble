name: Fallow Audit

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'scripts/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'tsconfig*.json'
      - '.fallowrc.json'
      - 'fallow.toml'
      - '.fallow.toml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dead-code:
    name: Dead code check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/actions/setup

      - name: Run fallow dead code check
        run: pnpm exec fallow audit --base "origin/${{ github.event.pull_request.base.ref || 'main' }}" --format json --quiet

  duplication:
    name: Duplication check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install dependencies
        uses: ./.github/actions/setup

      - name: Run fallow duplication check
        run: pnpm exec fallow dupes --threshold 12 --quiet
