name: Publish
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'publish' to confirm npm publish"
        required: true
        type: string

permissions: {}

jobs:
  publish:
    name: Publish to npm
    if: github.event.inputs.confirm == 'publish'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        uses: ./.github/actions/setup
      - name: Require alpha prerelease mode or stable version
        run: |
          if [ -f .changeset/pre.json ]; then
            echo "Prerelease mode active — will publish to dist-tag from pre.json"
          else
            echo "::notice::Publishing without pre.json — versions will go to npm latest"
          fi
      - name: Build, test, and publish
        run: pnpm changeset-publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
