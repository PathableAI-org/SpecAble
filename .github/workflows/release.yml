# Pre-MVP: contributors add changesets in PRs; this workflow does not run on push to main.
# At MVP: run `pnpm changeset-pre-enter-alpha`, commit `.changeset/pre.json`, then dispatch
# this workflow manually to version packages. See .changeset/README.md.
name: Release
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  version:
    name: Version Packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        uses: ./.github/actions/setup
      - name: Create or update Version Packages pull request
        uses: changesets/action@v1
        with:
          version: pnpm changeset-version
          title: "Version Packages"
          commit: "Version packages"
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
