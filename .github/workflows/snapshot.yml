name: Snapshot
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    name: Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        uses: ./.github/actions/setup
      - name: Build package
        run: pnpm build
      - name: Create snapshot
        id: snapshot
        run: |
          set +e
          output="$(pnpx pkg-pr-new@0.0.24 publish --pnpm --comment=off ./packages/cli 2>&1)"
          status=$?
          set -e

          echo "$output"

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if [[ "$output" == *"The app https://github.com/apps/pkg-pr-new is not installed"* ]]; then
            echo "::warning::Skipping snapshot publish because the pkg.pr.new GitHub App is not installed for this repository."
            exit 0
          fi

          exit "$status"
